name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pgsql, pdo_pgsql

      - name: Setup DDEV
        uses: ddev/setup-ddev@v1

      - name: Start DDEV
        run: ddev start

      - name: Install dependencies
        run: ddev composer install --no-interaction

      - name: Verify site builds
        run: |
          ddev drush core:status
          ddev drush cr

      - name: Check for critical errors in logs
        if: failure()
        run: ddev logs --tail=50