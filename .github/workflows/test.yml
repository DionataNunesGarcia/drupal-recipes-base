name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pgsql, pdo_pgsql

      - name: Setup DDEV
        uses: ddev/setup-ddev@v1

      - name: Start DDEV
        run: ddev start

      - name: Install dependencies
        run: |
          ddev composer install
          ddev composer require --dev phpunit/phpunit:^10 --no-interaction

      - name: Run tests
        run: |
          ddev phpunit --configuration phpunit.xml.dist

      - name: Run database updates
        run: ddev drush updatedb -y

      - name: Verify site
        run: ddev drush core:status