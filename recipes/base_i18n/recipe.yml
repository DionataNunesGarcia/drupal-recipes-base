name: "Base i18n"
description: "Infraestrutura multilíngue do Drupal"
type: "Site"

install:
  - language
  - locale
  - content_translation
  - config_translation
  - base_i18n

config:
  actions:
    locale.settings:
      simple_config_update:
        translation:
          use_source: local
        cache_strings: true
