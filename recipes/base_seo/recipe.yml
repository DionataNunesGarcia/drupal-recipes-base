name: "Base SEO"
description: "Complete SEO setup: clean URLs, meta tags, redirects, XML sitemap, and schema.org markup"
type: "Site"

install:
  # Core modules
  - path
  - path_alias

  # Contrib SEO essentials
  - pathauto
  - token
  - metatag
  - metatag_open_graph
  - metatag_twitter_cards
  - redirect
  - redirect_404
  - simple_sitemap

  # Additional SEO enhancements
  - robotstxt
  - google_analytics
  - schema_metatag
  - schema_article
  - schema_web_page

  # Custom module (optional)
  - base_seo

config:
  actions:
    #
    # ========================================================
    # PATHAUTO: URL PATTERN CONFIGURATIONS
    # ========================================================
    #

    # Default content pattern
    pathauto.pattern.content:
      createIfNotExists:
        id: content
        label: "Content"
        type: "canonical_entities:node"
        pattern: "[node:content-type:name]/[node:title]"
        weight: -5
        status: true
        relationships:
          "canonical_entities:node":
            bundles: []
            negate: false

    # Blog specific pattern
    pathauto.pattern.blog:
      createIfNotExists:
        id: blog
        label: "Blog"
        type: "canonical_entities:node"
        pattern: "blog/[node:title]"
        weight: -10
        status: true
        relationships:
          "canonical_entities:node":
            bundles:
              - article
            negate: false

    # Page pattern (clean URLs)
    pathauto.pattern.page:
      createIfNotExists:
        id: page
        label: "Basic Page"
        type: "canonical_entities:node"
        pattern: "[node:title]"
        weight: -8
        status: true
        relationships:
          "canonical_entities:node":
            bundles:
              - page
            negate: false

    # Taxonomy term pattern
    pathauto.pattern.taxonomy_term:
      createIfNotExists:
        id: taxonomy_term
        label: "Taxonomy term"
        type: "canonical_entities:taxonomy_term"
        pattern: "[term:vocabulary]/[term:name]"
        weight: -5
        status: true

    # User pattern
    pathauto.pattern.user:
      createIfNotExists:
        id: user
        label: "User"
        type: "canonical_entities:user"
        pattern: "user/[user:name]"
        weight: -5
        status: true

    #
    # ========================================================
    # PATHAUTO: GENERAL SETTINGS
    # ========================================================
    #
    pathauto.settings:
      simple_config_update:
        enabled_entity_types:
          - user
          - node
          - taxonomy_term
        verbose: false
        separator: "-"
        max_length: 100
        max_component_length: 100
        transliterate: true
        reduce_ascii: true
        case: true # Convert to lowercase
        update_action: 2 # Create redirect

    #
    # ========================================================
    # METATAG: GLOBAL DEFAULT META TAGS
    # ========================================================
    #
    metatag.metatag_defaults.global:
      simple_config_update:
        tags:
          title: "[current-page:title] | [site:name]"
          description: "[current-page:summary]"
          canonical_url: "[current-page:url]"

          # Open Graph
          og_site_name: "[site:name]"
          og_type: "website"
          og_title: "[current-page:title]"
          og_description: "[current-page:summary]"
          og_url: "[current-page:url]"
          og_image: "[site:logo]"

          # Twitter Cards
          twitter_cards_type: "summary"
          twitter_cards_title: "[current-page:title]"
          twitter_cards_description: "[current-page:summary]"
          twitter_cards_image: "[site:logo]"

    #
    # ========================================================
    # METATAG: NODE (CONTENT) DEFAULTS
    # ========================================================
    #
    metatag.metatag_defaults.node:
      simple_config_update:
        tags:
          title: "[node:title] | [site:name]"
          description: "[node:summary]"
          canonical_url: "[node:url]"

          # Open Graph
          og_title: "[node:title]"
          og_description: "[node:summary]"
          og_url: "[node:url]"
          og_type: "article"
          article_published_time: "[node:created:html_datetime]"
          article_modified_time: "[node:changed:html_datetime]"
          article_author: "[node:author:display-name]"

          # Twitter Cards
          twitter_cards_type: "summary_large_image"
          twitter_cards_title: "[node:title]"
          twitter_cards_description: "[node:summary]"

    #
    # ========================================================
    # METATAG: TAXONOMY TERM DEFAULTS
    # ========================================================
    #
    metatag.metatag_defaults.taxonomy_term:
      createIfNotExists:
        id: taxonomy_term
        label: "Taxonomy term"
        tags:
          title: "[term:name] | [site:name]"
          description: "[term:description]"
          canonical_url: "[term:url]"

    #
    # ========================================================
    # METATAG: USER DEFAULTS
    # ========================================================
    #
    metatag.metatag_defaults.user:
      createIfNotExists:
        id: user
        label: "User"
        tags:
          title: "[user:display-name] | [site:name]"
          description: "Profile page for [user:display-name]"
          canonical_url: "[user:url]"
          robots: "noindex, follow"

    #
    # ========================================================
    # METATAG: FRONT PAGE DEFAULTS
    # ========================================================
    #
    metatag.metatag_defaults.front:
      simple_config_update:
        tags:
          title: "[site:name] | [site:slogan]"
          description: "[site:slogan]"
          canonical_url: "[site:url]"

          og_title: "[site:name]"
          og_description: "[site:slogan]"
          og_url: "[site:url]"
          og_image: "[site:logo]"

    #
    # ========================================================
    # SIMPLE SITEMAP: GENERAL SETTINGS
    # ========================================================
    #
    simple_sitemap.settings:
      simple_config_update:
        max_links: 2000
        cron_generate: true
        cron_generate_interval: 1 # Generate daily
        remove_duplicates: true
        skip_untranslated: false
        base_url: ""
        default_variant: "default"

    #
    # ========================================================
    # REDIRECT: 404 SETTINGS
    # ========================================================
    #
    redirect.settings:
      simple_config_update:
        auto_redirect: true
        passthrough_querystring: true
        warning: false
        default_status_code: 301
        route_normalizer_enabled: true
        normalize_aliases: true
        access_check: true

    #
    # ========================================================
    # ROBOTS.TXT: CONFIGURATION
    # ========================================================
    #
    robotstxt.settings:
      simple_config_update:
        content: |
          # robots.txt for Drupal
          User-agent: *
          Crawl-delay: 10

          # Directories
          Disallow: /admin/
          Disallow: /comment/reply/
          Disallow: /filter/tips
          Disallow: /node/add/
          Disallow: /search/
          Disallow: /user/register
          Disallow: /user/password
          Disallow: /user/login
          Disallow: /user/logout

          # Files
          Disallow: /README.txt
          Disallow: /web.config

          # Paths (clean URLs)
          Disallow: /admin/
          Disallow: /comment/
          Disallow: /filter/
          Disallow: /node/add/
          Disallow: /search/
          Disallow: /user/

          # Sitemap
          Sitemap: [site:url]sitemap.xml
